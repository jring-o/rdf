name: README node counts

on:
  pull_request:
    paths:
      - "graph/**"
      - "README.md"
      - "tools/update_readme.py"
      - ".github/workflows/readme-counts.yml"
  push:
    branches: [main]
    paths:
      - "graph/**"
      - "README.md"
      - "tools/update_readme.py"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify README node counts are in sync with graph/
        run: python tools/update_readme.py
