<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="fig9-title">
  <title id="fig9-title">Cost vs. preservation horizon, by tier</title>

  <defs>
    <style>
      .ink   { fill: #111; }
      .line  { stroke: #111; fill: none; stroke-width: 1; }
      .thin  { stroke: #111; fill: none; stroke-width: 0.75; }
      .vthin { stroke: #111; fill: none; stroke-width: 0.5; stroke-opacity: 0.35; }
      .mute  { fill: #666; }
      .rust  { fill: #B44620; }
      .rust-stroke { stroke: #B44620; fill: none; stroke-width: 1.2; }
      .lbl   { font-family: 'EB Garamond', 'Garamond', 'Georgia', serif; }
      .sub   { font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="30" y="50" class="sub mute" font-size="10.5" letter-spacing="0.18em">FIG. 9  ·  PARETO POSITIONING</text>
  <text x="30" y="80" class="lbl ink" font-size="22" font-style="italic">Cost vs. preservation horizon, by tier.</text>

  <!-- =================== AXES =================== -->
  <!-- Plot area: x=170 to x=860, y=130 to y=450 -->

  <!-- Y axis (left) -->
  <line x1="170" y1="130" x2="170" y2="450" class="thin"/>
  <!-- X axis (bottom) -->
  <line x1="170" y1="450" x2="860" y2="450" class="thin"/>

  <!-- Y axis ticks and labels: 0, 10, 20, 30, 40, 50 + "indefinite" with break -->
  <g class="sub mute" font-size="10" text-anchor="end">
    <text x="163" y="454">0</text>
    <text x="163" y="384">10</text>
    <text x="163" y="324">20</text>
    <text x="163" y="264">30</text>
    <text x="163" y="204">40</text>
    <text x="163" y="144">50</text>
    <text x="163" y="95">indef.</text>
  </g>
  <g class="thin">
    <line x1="165" y1="450" x2="170" y2="450"/>
    <line x1="165" y1="380" x2="170" y2="380"/>
    <line x1="165" y1="320" x2="170" y2="320"/>
    <line x1="165" y1="260" x2="170" y2="260"/>
    <line x1="165" y1="200" x2="170" y2="200"/>
    <line x1="165" y1="140" x2="170" y2="140"/>
    <line x1="165" y1="92" x2="170" y2="92"/>
  </g>

  <!-- Y-axis break indicator -->
  <g class="thin">
    <path d="M 164 115 L 176 111" stroke="#fff" stroke-width="4"/>
    <path d="M 164 125 L 176 121" stroke="#fff" stroke-width="4"/>
    <path d="M 164 115 L 176 111"/>
    <path d="M 164 125 L 176 121"/>
  </g>

  <!-- Y axis label -->
  <text transform="translate(50,320) rotate(-90)" text-anchor="middle" class="sub mute" font-size="10" letter-spacing="0.15em">PRESERVATION HORIZON  ·  YEARS</text>

  <!-- X axis ticks -->
  <g class="thin">
    <line x1="180" y1="450" x2="180" y2="455"/>
    <line x1="220" y1="450" x2="220" y2="455"/>
    <line x1="344" y1="450" x2="344" y2="455"/>
    <line x1="468" y1="450" x2="468" y2="455"/>
    <line x1="592" y1="450" x2="592" y2="455"/>
    <line x1="716" y1="450" x2="716" y2="455"/>
    <line x1="840" y1="450" x2="840" y2="455"/>
  </g>

  <!-- X axis labels -->
  <g class="sub mute" font-size="10" text-anchor="middle">
    <text x="180" y="470">≈ $0</text>
    <text x="220" y="470">$10</text>
    <text x="344" y="470">$100</text>
    <text x="468" y="470">$1k</text>
    <text x="592" y="470">$10k</text>
    <text x="716" y="470">$100k</text>
    <text x="840" y="470">$1M</text>
  </g>

  <!-- X axis label -->
  <text x="515" y="498" text-anchor="middle" class="sub mute" font-size="10" letter-spacing="0.15em">ANNUAL COST  ·  USD  ·  LOG SCALE</text>

  <!-- =================== GRIDLINES =================== -->
  <g class="vthin">
    <!-- Vertical -->
    <line x1="220" y1="130" x2="220" y2="450"/>
    <line x1="344" y1="130" x2="344" y2="450"/>
    <line x1="468" y1="130" x2="468" y2="450"/>
    <line x1="592" y1="130" x2="592" y2="450"/>
    <line x1="716" y1="130" x2="716" y2="450"/>
    <line x1="840" y1="130" x2="840" y2="450"/>
    <!-- Horizontal -->
    <line x1="170" y1="380" x2="860" y2="380"/>
    <line x1="170" y1="320" x2="860" y2="320"/>
    <line x1="170" y1="260" x2="860" y2="260"/>
    <line x1="170" y1="200" x2="860" y2="200"/>
    <line x1="170" y1="140" x2="860" y2="140"/>
  </g>

  <!-- =================== DATA — TIER BARS =================== -->

  <!-- TIER 0: ~4 years, near-zero cost.  y = 450 - 4*6 = 426 -->
  <g>
    <circle cx="180" cy="426" r="6" class="ink"/>
    <text x="192" y="430" class="sub ink" font-size="11"><tspan font-style="italic">Tier 0</tspan> — Local · ≈ 4 yrs, ≈ $0</text>
  </g>

  <!-- TIER 1: ~12 years, $4k-12k hosted + $100k-260k self-hosted.  y = 450 - 12*6 = 378 -->
  <g>
    <!-- hosted bar -->
    <rect x="542.6" y="374" width="59.2" height="8" class="ink"/>
    <!-- self-hosted bar -->
    <rect x="716" y="374" width="51.5" height="8" class="ink"/>
    <!-- connector dashed -->
    <line x1="602" y1="378" x2="716" y2="378" class="vthin" stroke-dasharray="2 3"/>
    <!-- label -->
    <text x="780" y="365" class="sub ink" font-size="11"><tspan font-style="italic">Tier 1</tspan> — Hosted</text>
    <text x="542.6" y="365" class="sub mute" font-size="10">turnkey</text>
    <text x="716" y="365" class="sub mute" font-size="10">self-hosted</text>
    <text x="775" y="395" class="sub mute" font-size="10">median 12 yrs at closure</text>
  </g>

  <!-- TIER 2: ~25 years, $550-25k.  y = 450 - 25*6 = 300 -->
  <g>
    <rect x="435.8" y="296" width="205.6" height="8" class="ink"/>
    <text x="655" y="287" class="sub ink" font-size="11"><tspan font-style="italic">Tier 2</tspan> — Coordinated</text>
    <text x="655" y="317" class="sub mute" font-size="10">range 5–30 yrs; CLOCKSS 20, LOCKSS 27</text>
  </g>

  <!-- TIER 3: indefinite (top, at y=96).  Standalone $42-$360 + ≈$0 on existing.  -->
  <g>
    <!-- standalone bar -->
    <rect x="297.3" y="92" width="115.7" height="8" class="ink"/>
    <!-- connector from standalone back to ≈$0 marker -->
    <line x1="188" y1="96" x2="295" y2="96" class="rust-stroke" stroke-dasharray="3 3" stroke-width="0.8"/>
    <!-- marginal marker -->
    <circle cx="180" cy="96" r="6" class="rust"/>
    <!-- label -->
    <text x="425" y="88" class="sub ink" font-size="11"><tspan font-style="italic">Tier 3</tspan> — Protocol-level</text>
    <text x="425" y="105" class="sub mute" font-size="10">standalone $42–360; ≈ $0 on existing infrastructure</text>
    <text x="425" y="121" class="sub mute" font-size="10">class: DNS 43, email 44, BitTorrent 25, Git 21 (continuous)</text>
  </g>

</svg>
