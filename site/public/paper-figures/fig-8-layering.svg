<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="fig8-title">
  <title id="fig8-title">Governance layers on any storage substrate</title>

  <defs>
    <style>
      .ink   { fill: #111; }
      .line  { stroke: #111; fill: none; stroke-width: 1; }
      .thin  { stroke: #111; fill: none; stroke-width: 0.75; }
      .dash  { stroke: #111; fill: none; stroke-width: 0.75; stroke-dasharray: 3 3; }
      .mute  { fill: #666; }
      .rust  { fill: #B44620; }
      .rust-stroke { stroke: #B44620; fill: none; stroke-width: 1; }
      .lbl   { font-family: 'EB Garamond', 'Garamond', 'Georgia', serif; }
      .sub   { font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace; }
    </style>
    <marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#ffffff"/>

  <!-- Header -->
  <text x="30" y="50" class="sub mute" font-size="10.5" letter-spacing="0.18em">FIG. 8  ·  LAYERING</text>
  <text x="30" y="80" class="lbl ink" font-size="22" font-style="italic">Governance layers on any storage substrate.</text>

  <!-- ==================== GOVERNANCE LAYER ==================== -->
  <g>
    <rect x="60" y="115" width="780" height="110" class="line"/>

    <text x="80" y="138" class="sub mute" font-size="10" letter-spacing="0.15em">GOVERNANCE  /  METADATA  LAYER</text>

    <!-- Properties as labeled pills -->
    <g class="sub ink" font-size="13" font-style="italic">
      <text x="80" y="172">curation</text>
      <text x="200" y="172">versioning policy</text>
      <text x="370" y="172">dispute resolution</text>
      <text x="550" y="172">schema governance</text>
      <text x="730" y="172">provenance</text>

      <text x="80" y="202">access control</text>
      <text x="220" y="202">persistent identifiers</text>
      <text x="410" y="202">metadata quality</text>
      <text x="580" y="202">embargo &amp; license terms</text>
    </g>
  </g>

  <!-- ==================== CONNECTOR ==================== -->
  <g>
    <!-- Three vertical connectors, labeled "layers on" -->
    <line x1="180" y1="225" x2="180" y2="275" class="thin" marker-end="url(#arr8)"/>
    <line x1="450" y1="225" x2="450" y2="275" class="thin" marker-end="url(#arr8)"/>
    <line x1="720" y1="225" x2="720" y2="275" class="thin" marker-end="url(#arr8)"/>

    <text x="450" y="255" text-anchor="middle" class="sub mute" font-size="10.5" font-style="italic">architecturally independent of substrate</text>
  </g>

  <!-- ==================== STORAGE SUBSTRATE ==================== -->
  <!-- Three columns: Tier 1 (60-320), Tier 2 (320-580), Tier 3 (580-840) -->

  <g>
    <!-- Outer frame -->
    <rect x="60" y="285" width="780" height="120" class="line"/>

    <!-- Column dividers -->
    <line x1="320" y1="285" x2="320" y2="405" class="thin"/>
    <line x1="580" y1="285" x2="580" y2="405" class="thin"/>

    <!-- Label: STORAGE SUBSTRATE (left) -->
    <text x="80" y="308" class="sub mute" font-size="10" letter-spacing="0.15em">STORAGE SUBSTRATE</text>

    <!-- Tier 1 -->
    <text x="80" y="340" class="sub mute" font-size="10.5" letter-spacing="0.15em">TIER 1</text>
    <text x="80" y="360" class="lbl ink" font-size="15" font-style="italic">Hosted</text>
    <text x="80" y="385" class="sub ink" font-size="11">AWS S3, Zenodo,</text>
    <text x="80" y="399" class="sub ink" font-size="11">Dryad</text>

    <!-- Tier 2 -->
    <text x="340" y="340" class="sub mute" font-size="10.5" letter-spacing="0.15em">TIER 2</text>
    <text x="340" y="360" class="lbl ink" font-size="15" font-style="italic">Coordinated</text>
    <text x="340" y="385" class="sub ink" font-size="11">CLOCKSS, wwPDB,</text>
    <text x="340" y="399" class="sub ink" font-size="11">INSDC</text>

    <!-- Tier 3 -->
    <text x="600" y="340" class="sub mute" font-size="10.5" letter-spacing="0.15em">TIER 3</text>
    <text x="600" y="360" class="lbl ink" font-size="15" font-style="italic">Protocol-level</text>
    <text x="600" y="385" class="sub ink" font-size="11">Git, IPFS,</text>
    <text x="600" y="399" class="sub ink" font-size="11">BitTorrent</text>
  </g>

  <!-- ==================== CAPTION ==================== -->
  <line x1="30" y1="440" x2="60" y2="440" stroke="#111" stroke-width="0.6"/>
  <text x="30" y="462" class="sub ink" font-size="11.5">
    <tspan font-style="italic">Scientific governance already sits on top of storage substrate</tspan> — wwPDB's weekly synchronization,
  </text>
  <text x="30" y="478" class="sub ink" font-size="11.5">
    INSDC's Feature Table, the IVOA standards. The objection that Tier 3 cannot support curation misreads the layering: the governance
  </text>
  <text x="30" y="494" class="sub ink" font-size="11.5">
    layer is tier-independent and can run on Tier 3 as readily as on Tier 1 or Tier 2.
  </text>
</svg>
