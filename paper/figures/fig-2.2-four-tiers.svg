<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="fig22-title">
  <title id="fig22-title">Four architectural tiers of data preservation</title>

  <defs>
    <style>
      .ink   { fill: #111; }
      .line  { stroke: #111; fill: none; stroke-width: 1; }
      .thin  { stroke: #111; fill: none; stroke-width: 0.75; }
      .dash  { stroke: #111; fill: none; stroke-width: 0.75; stroke-dasharray: 3 3; }
      .very-thin { stroke: #111; fill: none; stroke-width: 0.5; stroke-opacity: 0.6; }
      .mute  { fill: #666; }
      .rust  { fill: #B44620; }
      .lbl   { font-family: 'EB Garamond', 'Garamond', 'Georgia', serif; }
      .sub   { font-family: 'Source Sans 3', 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif; }
      .mono  { font-family: 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace; }
      .rowline { stroke: #ddd; stroke-width: 0.75; }
      .section { stroke: #111; stroke-width: 0.75; stroke-opacity: 0.35; }
    </style>
  </defs>

  <rect width="900" height="680" fill="#ffffff"/>

  <!-- Column centers: 320, 490, 660, 830 -->

  <!-- ==================== TOPOLOGY ROW ==================== -->

  <!-- Tier 0 -->
  <g transform="translate(320,80)">
    <rect x="-30" y="-30" width="60" height="60" class="line"/>
    <circle cx="0" cy="0" r="4.5" class="ink"/>
  </g>

  <!-- Tier 1 -->
  <g transform="translate(490,80)">
    <rect x="-55" y="-45" width="110" height="90" class="dash"/>
    <rect x="-20" y="-20" width="40" height="40" class="line"/>
    <circle cx="0" cy="0" r="4.5" class="ink"/>
  </g>

  <!-- Tier 2 -->
  <g transform="translate(660,80)">
    <g class="thin" stroke-dasharray="2 2">
      <line x1="-38" y1="-25" x2="38" y2="-25"/>
      <line x1="-38" y1="25" x2="38" y2="25"/>
      <line x1="-38" y1="-25" x2="-38" y2="25"/>
      <line x1="38" y1="-25" x2="38" y2="25"/>
      <line x1="-38" y1="-25" x2="38" y2="25"/>
      <line x1="38" y1="-25" x2="-38" y2="25"/>
    </g>
    <rect x="-52" y="-39" width="28" height="28" class="line"/>
    <circle cx="-38" cy="-25" r="4" class="ink"/>
    <rect x="24" y="-39" width="28" height="28" class="line"/>
    <circle cx="38" cy="-25" r="4" class="ink"/>
    <rect x="-52" y="11" width="28" height="28" class="line"/>
    <circle cx="-38" cy="25" r="4" class="ink"/>
    <rect x="24" y="11" width="28" height="28" class="line"/>
    <circle cx="38" cy="25" r="4" class="ink"/>
  </g>

  <!-- Tier 3 -->
  <g transform="translate(830,80)">
    <g class="very-thin">
      <line x1="-60" y1="-35" x2="-20" y2="-45"/>
      <line x1="-20" y1="-45" x2="25" y2="-38"/>
      <line x1="25" y1="-38" x2="58" y2="-25"/>
      <line x1="58" y1="-25" x2="65" y2="10"/>
      <line x1="65" y1="10" x2="45" y2="38"/>
      <line x1="45" y1="38" x2="0" y2="45"/>
      <line x1="0" y1="45" x2="-45" y2="35"/>
      <line x1="-45" y1="35" x2="-60" y2="-35"/>
      <line x1="-60" y1="-35" x2="25" y2="-38"/>
      <line x1="-20" y1="-45" x2="58" y2="-25"/>
      <line x1="-20" y1="-45" x2="-15" y2="-10"/>
      <line x1="-15" y1="-10" x2="25" y2="-38"/>
      <line x1="-15" y1="-10" x2="30" y2="8"/>
      <line x1="30" y1="8" x2="58" y2="-25"/>
      <line x1="30" y1="8" x2="45" y2="38"/>
      <line x1="-15" y1="-10" x2="-45" y2="35"/>
      <line x1="-15" y1="-10" x2="0" y2="45"/>
      <line x1="30" y1="8" x2="65" y2="10"/>
    </g>
    <g class="ink">
      <circle cx="-60" cy="-35" r="3.5"/>
      <circle cx="-20" cy="-45" r="3.5"/>
      <circle cx="25" cy="-38" r="3.5"/>
      <circle cx="58" cy="-25" r="3.5"/>
      <circle cx="65" cy="10" r="3.5"/>
      <circle cx="45" cy="38" r="3.5"/>
      <circle cx="0" cy="45" r="3.5"/>
      <circle cx="-45" cy="35" r="3.5"/>
      <circle cx="-15" cy="-10" r="3.5"/>
      <circle cx="30" cy="8" r="3.5"/>
    </g>
  </g>

  <!-- ==================== TIER LABELS ==================== -->
  <g>
    <text x="320" y="195" text-anchor="middle" class="sub mute" font-size="11" letter-spacing="0.15em">TIER 0</text>
    <text x="320" y="218" text-anchor="middle" class="lbl ink" font-size="18" font-style="italic">Local</text>

    <text x="490" y="195" text-anchor="middle" class="sub mute" font-size="11" letter-spacing="0.15em">TIER 1</text>
    <text x="490" y="218" text-anchor="middle" class="lbl ink" font-size="18" font-style="italic">Hosted</text>

    <text x="660" y="195" text-anchor="middle" class="sub mute" font-size="11" letter-spacing="0.15em">TIER 2</text>
    <text x="660" y="218" text-anchor="middle" class="lbl ink" font-size="18" font-style="italic">Coordinated</text>

    <text x="830" y="195" text-anchor="middle" class="sub mute" font-size="11" letter-spacing="0.15em">TIER 3</text>
    <text x="830" y="218" text-anchor="middle" class="lbl ink" font-size="18" font-style="italic">Protocol-level</text>
  </g>

  <!-- Section divider above matrix -->
  <line x1="30" y1="248" x2="870" y2="248" class="section"/>

  <!-- ==================== PROPERTY MATRIX ==================== -->

  <g class="sub" font-size="13">
    <text x="30" y="282" class="ink">Multiple copies</text>
    <text x="320" y="282" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="490" y="282" text-anchor="middle" class="ink">✓</text>
    <text x="660" y="282" text-anchor="middle" class="ink">✓</text>
    <text x="830" y="282" text-anchor="middle" class="ink">✓</text>
    <line x1="30" y1="298" x2="870" y2="298" class="rowline"/>

    <text x="30" y="322" class="ink">Independent failure domains</text>
    <text x="320" y="322" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="490" y="322" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="660" y="322" text-anchor="middle" class="ink">✓</text>
    <text x="830" y="322" text-anchor="middle" class="ink">✓</text>
    <line x1="30" y1="338" x2="870" y2="338" class="rowline"/>

    <text x="30" y="362" class="ink">Verifiable integrity</text>
    <text x="320" y="362" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="490" y="362" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="660" y="362" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="830" y="362" text-anchor="middle" class="ink">✓</text>
    <line x1="30" y1="378" x2="870" y2="378" class="rowline"/>

    <text x="30" y="402" class="ink">Organizational independence</text>
    <text x="320" y="402" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="490" y="402" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="660" y="402" text-anchor="middle" class="mute" font-size="18">—</text>
    <text x="830" y="402" text-anchor="middle" class="ink">✓</text>
  </g>

  <!-- Section divider before vulnerabilities -->
  <line x1="30" y1="428" x2="870" y2="428" class="section"/>

  <!-- ==================== VULNERABILITIES ROW ==================== -->
  <g>
    <text x="30" y="456" class="sub mute" font-size="10.5" letter-spacing="0.15em">PRIMARY VULNERABILITIES</text>

    <g class="sub ink" font-size="11.5" text-anchor="middle">
      <!-- Tier 0 -->
      <text x="320" y="484">17%/yr availability decay</text>
      <text x="320" y="500">no redundancy</text>
      <text x="320" y="516">one event ends the data</text>

      <!-- Tier 1 -->
      <text x="490" y="484">platform opacity</text>
      <text x="490" y="500">funding-model dependency</text>
      <text x="490" y="516">jurisdictional exposure</text>

      <!-- Tier 2 -->
      <text x="660" y="484">governance or funding</text>
      <text x="660" y="500">failure collapses</text>
      <text x="660" y="516">the network</text>

      <!-- Tier 3 -->
      <text x="830" y="484">requires deliberate</text>
      <text x="830" y="500">participation to</text>
      <text x="830" y="516">generate copies</text>
    </g>
  </g>

  <!-- Section divider before examples -->
  <line x1="30" y1="542" x2="870" y2="542" class="section"/>

  <!-- ==================== EXAMPLES ROW ==================== -->
  <g>
    <text x="30" y="570" class="sub mute" font-size="10.5" letter-spacing="0.15em">EXAMPLES</text>

    <g class="sub ink" font-size="11.5" text-anchor="middle">
      <text x="320" y="598">Lab server,</text>
      <text x="320" y="614">PI laptop</text>

      <text x="490" y="598">Zenodo, Dryad,</text>
      <text x="490" y="614">AWS S3</text>

      <text x="660" y="598">CLOCKSS, LOCKSS,</text>
      <text x="660" y="614">INSDC, wwPDB</text>

      <text x="830" y="598">Git, BitTorrent,</text>
      <text x="830" y="614">IPFS, DNS</text>
    </g>
  </g>
</svg>
