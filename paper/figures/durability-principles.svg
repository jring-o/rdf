<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 22px; fill: #1a1a1a; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; letter-spacing: 1.8px; fill: #6b6b6b; }
      .caption { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 15px; fill: #993C1D; }
      .caption-neutral { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 15px; fill: #6b6b6b; }
      .body { font-family: Georgia, 'Times New Roman', serif; font-size: 15px; fill: #1a1a1a; }
      .small-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #1a1a1a; }
      .arrow-label { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 13px; fill: #1a1a1a; }
      .event-label { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 14px; fill: #993C1D; }
      .mono { font-family: 'Courier New', monospace; font-size: 13px; fill: #6b6b6b; }
    </style>
  </defs>

  <!-- =============== COLUMN HEADERS =============== -->
  <text class="title" x="200" y="50" text-anchor="middle">i. Failure domains</text>
  <text class="title" x="600" y="50" text-anchor="middle">ii. Verifiable integrity</text>
  <text class="title" x="1000" y="50" text-anchor="middle">iii. Organizational independence</text>

  <line x1="60" y1="75" x2="1140" y2="75" stroke="#d4d4d4" stroke-width="0.8"/>

  <!-- =============== COLUMN 1: FAILURE DOMAINS =============== -->

  <!-- Top: Shared domain -->
  <text class="label" x="200" y="115" text-anchor="middle">SHARED DOMAIN</text>

  <!-- Box with 4 X's -->
  <rect x="120" y="155" width="160" height="100" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <g stroke="#993C1D" stroke-width="1.8" stroke-linecap="round">
    <line x1="148" y1="180" x2="166" y2="198"/><line x1="166" y1="180" x2="148" y2="198"/>
    <line x1="218" y1="180" x2="236" y2="198"/><line x1="236" y1="180" x2="218" y2="198"/>
    <line x1="148" y1="218" x2="166" y2="236"/><line x1="166" y1="218" x2="148" y2="236"/>
    <line x1="218" y1="218" x2="236" y2="236"/><line x1="236" y1="218" x2="218" y2="236"/>
  </g>
  <!-- event! callout -->
  <text class="event-label" x="115" y="142" text-anchor="end">event!</text>
  <line x1="120" y1="138" x2="153" y2="183" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arrow)"/>

  <text class="caption" x="200" y="290" text-anchor="middle">4 of 4 lost</text>

  <!-- Bottom: Independent domains -->
  <text class="label" x="200" y="345" text-anchor="middle">INDEPENDENT DOMAINS</text>

  <g fill="none" stroke="#1a1a1a" stroke-width="1">
    <rect x="100" y="380" width="46" height="46"/>
    <rect x="156" y="380" width="46" height="46"/>
    <rect x="212" y="380" width="46" height="46"/>
    <rect x="268" y="380" width="46" height="46"/>
  </g>
  <!-- X in first box -->
  <g stroke="#993C1D" stroke-width="1.8" stroke-linecap="round">
    <line x1="113" y1="394" x2="133" y2="412"/><line x1="133" y1="394" x2="113" y2="412"/>
  </g>
  <!-- dots in others -->
  <circle cx="179" cy="403" r="2.5" fill="#1a1a1a"/>
  <circle cx="235" cy="403" r="2.5" fill="#1a1a1a"/>
  <circle cx="291" cy="403" r="2.5" fill="#1a1a1a"/>
  <!-- event! callout -->
  <text class="event-label" x="98" y="367" text-anchor="end">event!</text>
  <line x1="103" y1="363" x2="118" y2="392" stroke="#993C1D" stroke-width="0.8" marker-end="url(#arrow)"/>

  <text class="caption" x="200" y="465" text-anchor="middle">3 of 4 survive</text>

  <!-- Divider -->
  <line x1="60" y1="510" x2="340" y2="510" stroke="#bbb" stroke-width="0.8"/>

  <!-- Body text -->
  <text class="body" x="60" y="545">
    <tspan x="60" dy="0">A failure domain is whatever a single event</tspan>
    <tspan x="60" dy="22">can reach — a server, an organization, a</tspan>
    <tspan x="60" dy="22">funding source, a jurisdiction. Copies inside</tspan>
    <tspan x="60" dy="22">the same domain share its fate; copies</tspan>
    <tspan x="60" dy="22">spread across independent domains do not.</tspan>
  </text>

  <!-- =============== COLUMN 2: VERIFIABLE INTEGRITY =============== -->

  <!-- Top: Asserted by holder -->
  <text class="label" x="600" y="115" text-anchor="middle">ASSERTED BY HOLDER</text>

  <rect x="490" y="180" width="80" height="48" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text class="small-label" x="530" y="210" text-anchor="middle">source</text>

  <rect x="680" y="180" width="48" height="48" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text class="small-label" x="704" y="212" text-anchor="middle" font-size="20">?</text>

  <line x1="570" y1="204" x2="676" y2="204" stroke="#1a1a1a" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="623" y="194" text-anchor="middle">bytes</text>
  <text class="arrow-label" x="623" y="222" text-anchor="middle">"Trust me"</text>

  <text class="caption" x="600" y="290" text-anchor="middle">depends on the holder</text>

  <!-- Bottom: Bound to contents -->
  <text class="label" x="600" y="345" text-anchor="middle">BOUND TO CONTENTS</text>

  <!-- bytes box -->
  <rect x="565" y="400" width="80" height="42" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text class="small-label" x="605" y="426" text-anchor="middle">bytes</text>

  <!-- Three checkmark circles -->
  <circle cx="495" cy="380" r="16" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M488 380 L494 386 L504 374" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="715" cy="380" r="16" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M708 380 L714 386 L724 374" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="495" cy="455" r="16" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M488 455 L494 461 L504 449" fill="none" stroke="#0F6E56" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dashed leader lines -->
  <line x1="510" y1="388" x2="563" y2="408" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="4 4"/>
  <line x1="700" y1="388" x2="647" y2="408" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="4 4"/>
  <line x1="510" y1="447" x2="563" y2="436" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="4 4"/>

  <!-- Hash callout -->
  <line x1="645" y1="436" x2="678" y2="455" stroke="#1a1a1a" stroke-width="0.5"/>
  <text class="mono" x="682" y="460">sha256: 0xa3f8…51c4</text>

  <text class="caption-neutral" x="600" y="500" text-anchor="middle">any peer re-computes the hash</text>

  <!-- Divider -->
  <line x1="450" y1="535" x2="750" y2="535" stroke="#bbb" stroke-width="0.8"/>

  <!-- Body text -->
  <text class="body" x="450" y="570">
    <tspan x="450" dy="0">When a dataset's identity is the hash of</tspan>
    <tspan x="450" dy="22">its bytes, any recipient can confirm the</tspan>
    <tspan x="450" dy="22">data matches what was published —</tspan>
    <tspan x="450" dy="22">without trusting the source or any</tspan>
    <tspan x="450" dy="22">intermediary. The signature travels with</tspan>
    <tspan x="450" dy="22">the object.</tspan>
  </text>

  <!-- =============== COLUMN 3: ORGANIZATIONAL INDEPENDENCE =============== -->

  <!-- Top: Dependent on one organization -->
  <text class="label" x="1000" y="115" text-anchor="middle">DEPENDENT ON ONE ORGANIZATION</text>

  <!-- 6 peripheral nodes -->
  <g fill="none" stroke="#1a1a1a" stroke-width="0.8">
    <circle cx="870" cy="170" r="9"/>
    <circle cx="870" cy="210" r="9"/>
    <circle cx="870" cy="250" r="9"/>
    <circle cx="1130" cy="170" r="9"/>
    <circle cx="1130" cy="210" r="9"/>
    <circle cx="1130" cy="250" r="9"/>
  </g>

  <!-- Dashed lines from periphery to central crossed-out box -->
  <g stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="3 4" fill="none">
    <line x1="879" y1="170" x2="945" y2="200"/>
    <line x1="879" y1="210" x2="945" y2="210"/>
    <line x1="879" y1="250" x2="945" y2="225"/>
    <line x1="1121" y1="170" x2="1055" y2="200"/>
    <line x1="1121" y1="210" x2="1055" y2="210"/>
    <line x1="1121" y1="250" x2="1055" y2="225"/>
  </g>

  <!-- Central box with X -->
  <rect x="945" y="180" width="110" height="60" fill="none" stroke="#993C1D" stroke-width="1.2"/>
  <line x1="945" y1="180" x2="1055" y2="240" stroke="#993C1D" stroke-width="1.5"/>
  <line x1="1055" y1="180" x2="945" y2="240" stroke="#993C1D" stroke-width="1.5"/>

  <text class="caption" x="1000" y="290" text-anchor="middle">org fails — all copies stranded</text>

  <!-- Bottom: Distributed as byproduct of use -->
  <text class="label" x="1000" y="345" text-anchor="middle">DISTRIBUTED AS BYPRODUCT OF USE</text>

  <!-- Mesh network: 8 nodes positioned around -->
  <!-- Node positions -->
  <g id="mesh-lines" stroke="#1a1a1a" stroke-width="0.7" fill="none">
    <!-- Outer ring connections -->
    <line x1="870" y1="395" x2="940" y2="375"/>
    <line x1="940" y1="375" x2="1020" y2="375"/>
    <line x1="1020" y1="375" x2="1100" y2="395"/>
    <line x1="1100" y1="395" x2="1130" y2="450"/>
    <line x1="1130" y1="450" x2="1080" y2="490"/>
    <line x1="1080" y1="490" x2="990" y2="490"/>
    <line x1="990" y1="490" x2="900" y2="490"/>
    <line x1="900" y1="490" x2="870" y2="450"/>
    <line x1="870" y1="450" x2="870" y2="395"/>
    <!-- Cross connections -->
    <line x1="870" y1="395" x2="1020" y2="375"/>
    <line x1="870" y1="395" x2="1100" y2="395"/>
    <line x1="870" y1="395" x2="1080" y2="490"/>
    <line x1="870" y1="395" x2="1130" y2="450"/>
    <line x1="870" y1="395" x2="990" y2="490"/>
    <line x1="940" y1="375" x2="1100" y2="395"/>
    <line x1="940" y1="375" x2="1130" y2="450"/>
    <line x1="940" y1="375" x2="1080" y2="490"/>
    <line x1="940" y1="375" x2="990" y2="490"/>
    <line x1="940" y1="375" x2="900" y2="490"/>
    <line x1="940" y1="375" x2="870" y2="450"/>
    <line x1="1020" y1="375" x2="900" y2="490"/>
    <line x1="1020" y1="375" x2="990" y2="490"/>
    <line x1="1020" y1="375" x2="1080" y2="490"/>
    <line x1="1020" y1="375" x2="1130" y2="450"/>
    <line x1="1020" y1="375" x2="870" y2="450"/>
    <line x1="1100" y1="395" x2="900" y2="490"/>
    <line x1="1100" y1="395" x2="990" y2="490"/>
    <line x1="1100" y1="395" x2="1080" y2="490"/>
    <line x1="1100" y1="395" x2="870" y2="450"/>
    <line x1="1130" y1="450" x2="900" y2="490"/>
    <line x1="1130" y1="450" x2="990" y2="490"/>
    <line x1="870" y1="450" x2="1080" y2="490"/>
    <line x1="870" y1="450" x2="990" y2="490"/>
  </g>

  <!-- Node dots -->
  <g fill="#1a1a1a">
    <circle cx="870" cy="395" r="5"/>
    <circle cx="940" cy="375" r="5"/>
    <circle cx="1020" cy="375" r="5"/>
    <circle cx="1100" cy="395" r="5"/>
    <circle cx="1130" cy="450" r="5"/>
    <circle cx="1080" cy="490" r="5"/>
    <circle cx="990" cy="490" r="5"/>
    <circle cx="900" cy="490" r="5"/>
    <circle cx="870" cy="450" r="5"/>
  </g>

  <text class="caption-neutral" x="1000" y="525" text-anchor="middle">every participant holds a copy</text>

  <!-- Divider -->
  <line x1="850" y1="555" x2="1140" y2="555" stroke="#bbb" stroke-width="0.8"/>

  <!-- Body text -->
  <text class="body" x="850" y="590">
    <tspan x="850" dy="0">A system that depends on an</tspan>
    <tspan x="850" dy="22">organization's continued commitment</tspan>
    <tspan x="850" dy="22">inherits its failure modes. Protocols that</tspan>
    <tspan x="850" dy="22">produce copies as a byproduct of use —</tspan>
    <tspan x="850" dy="22">Git clone, BitTorrent — distribute</tspan>
    <tspan x="850" dy="22">redundancy no keeper maintains.</tspan>
  </text>
</svg>
