<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <style>
      .tier-num { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; letter-spacing: 2px; fill: #6b6b6b; }
      .tier-name { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 22px; fill: #1a1a1a; }
      .row-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; fill: #1a1a1a; }
      .section-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; letter-spacing: 2px; fill: #6b6b6b; }
      .check { font-family: Georgia, 'Times New Roman', serif; font-size: 18px; fill: #1a1a1a; }
      .dash { font-family: Georgia, 'Times New Roman', serif; font-size: 18px; fill: #b0b0b0; }
      .body-small { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #4a4a4a; }
      .example { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- ============ COLUMN POSITIONS ============ -->
  <!-- Label column: x=60..360 (right-aligned text at x=340) -->
  <!-- Tier 0: center x=540 -->
  <!-- Tier 1: center x=780 -->
  <!-- Tier 2: center x=1020 -->
  <!-- Tier 3: center x=1260 -->

  <!-- ============ TOP DIAGRAMS ============ -->

  <!-- Tier 0: single solid box with dot -->
  <rect x="510" y="40" width="60" height="60" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <circle cx="540" cy="70" r="3.5" fill="#1a1a1a"/>

  <!-- Tier 1: dashed outer box + solid inner box with dot -->
  <rect x="720" y="25" width="120" height="90" fill="none" stroke="#1a1a1a" stroke-width="0.8" stroke-dasharray="3 3"/>
  <rect x="760" y="55" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <circle cx="780" cy="75" r="3" fill="#1a1a1a"/>

  <!-- Tier 2: 4 boxes in a square, connected by dashed lines (X + sides) -->
  <!-- Boxes -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1.2">
    <rect x="970" y="30" width="30" height="30"/>
    <rect x="1040" y="30" width="30" height="30"/>
    <rect x="970" y="90" width="30" height="30"/>
    <rect x="1040" y="90" width="30" height="30"/>
  </g>
  <!-- Dots inside -->
  <g fill="#1a1a1a">
    <circle cx="985" cy="45" r="2.5"/>
    <circle cx="1055" cy="45" r="2.5"/>
    <circle cx="985" cy="105" r="2.5"/>
    <circle cx="1055" cy="105" r="2.5"/>
  </g>
  <!-- Dashed connections: top edge, bottom edge, both diagonals -->
  <g stroke="#1a1a1a" stroke-width="0.7" stroke-dasharray="3 3" fill="none">
    <line x1="1000" y1="45" x2="1040" y2="45"/>
    <line x1="1000" y1="105" x2="1040" y2="105"/>
    <line x1="1000" y1="60" x2="1040" y2="90"/>
    <line x1="1040" y1="60" x2="1000" y2="90"/>
  </g>

  <!-- Tier 3: irregular mesh of ~10 nodes -->
  <g stroke="#1a1a1a" stroke-width="0.7" fill="none">
    <!-- A web of triangulated connections -->
    <line x1="1210" y1="40" x2="1255" y2="55"/>
    <line x1="1255" y1="55" x2="1310" y2="40"/>
    <line x1="1310" y1="40" x2="1335" y2="80"/>
    <line x1="1335" y1="80" x2="1310" y2="115"/>
    <line x1="1310" y1="115" x2="1265" y2="120"/>
    <line x1="1265" y1="120" x2="1230" y2="105"/>
    <line x1="1230" y1="105" x2="1200" y2="85"/>
    <line x1="1200" y1="85" x2="1210" y2="40"/>
    <!-- Inner connections -->
    <line x1="1210" y1="40" x2="1255" y2="55"/>
    <line x1="1255" y1="55" x2="1265" y2="85"/>
    <line x1="1265" y1="85" x2="1310" y2="40"/>
    <line x1="1265" y1="85" x2="1335" y2="80"/>
    <line x1="1265" y1="85" x2="1310" y2="115"/>
    <line x1="1265" y1="85" x2="1265" y2="120"/>
    <line x1="1265" y1="85" x2="1230" y2="105"/>
    <line x1="1265" y1="85" x2="1200" y2="85"/>
    <line x1="1255" y1="55" x2="1230" y2="105"/>
    <line x1="1310" y1="115" x2="1230" y2="105"/>
  </g>
  <g fill="#1a1a1a">
    <circle cx="1210" cy="40" r="3.5"/>
    <circle cx="1255" cy="55" r="3.5"/>
    <circle cx="1310" cy="40" r="3.5"/>
    <circle cx="1335" cy="80" r="3.5"/>
    <circle cx="1310" cy="115" r="3.5"/>
    <circle cx="1265" cy="120" r="3.5"/>
    <circle cx="1230" cy="105" r="3.5"/>
    <circle cx="1200" cy="85" r="3.5"/>
    <circle cx="1265" cy="85" r="3.5"/>
  </g>

  <!-- ============ TIER HEADERS ============ -->
  <text class="tier-num" x="540" y="195" text-anchor="middle">TIER 0</text>
  <text class="tier-name" x="540" y="225" text-anchor="middle">Local</text>

  <text class="tier-num" x="780" y="195" text-anchor="middle">TIER 1</text>
  <text class="tier-name" x="780" y="225" text-anchor="middle">Hosted</text>

  <text class="tier-num" x="1020" y="195" text-anchor="middle">TIER 2</text>
  <text class="tier-name" x="1020" y="225" text-anchor="middle">Coordinated</text>

  <text class="tier-num" x="1260" y="195" text-anchor="middle">TIER 3</text>
  <text class="tier-name" x="1260" y="225" text-anchor="middle">Protocol-level</text>

  <!-- Divider above table -->
  <line x1="60" y1="265" x2="1340" y2="265" stroke="#bbb" stroke-width="0.8"/>

  <!-- ============ TABLE ROWS ============ -->

  <!-- Reusable check path: drawn at origin, translated into position -->
  <defs>
    <g id="check-mark">
      <path d="M -7 0 L -2 5 L 7 -6" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="dash-mark">
      <line x1="-9" y1="0" x2="9" y2="0" stroke="#b0b0b0" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Row 1: Multiple copies -->
  <text class="row-label" x="60" y="310">Multiple copies</text>
  <use href="#dash-mark" x="540" y="305"/>
  <use href="#check-mark" x="780" y="305"/>
  <use href="#check-mark" x="1020" y="305"/>
  <use href="#check-mark" x="1260" y="305"/>
  <line x1="60" y1="335" x2="1340" y2="335" stroke="#e5e5e5" stroke-width="0.6"/>

  <!-- Row 2: Independent failure domains -->
  <text class="row-label" x="60" y="375">Independent failure domains</text>
  <use href="#dash-mark" x="540" y="370"/>
  <use href="#dash-mark" x="780" y="370"/>
  <use href="#check-mark" x="1020" y="370"/>
  <use href="#check-mark" x="1260" y="370"/>
  <line x1="60" y1="400" x2="1340" y2="400" stroke="#e5e5e5" stroke-width="0.6"/>

  <!-- Row 3: Verifiable integrity -->
  <text class="row-label" x="60" y="440">Verifiable integrity</text>
  <use href="#dash-mark" x="540" y="435"/>
  <use href="#dash-mark" x="780" y="435"/>
  <use href="#dash-mark" x="1020" y="435"/>
  <use href="#check-mark" x="1260" y="435"/>
  <line x1="60" y1="465" x2="1340" y2="465" stroke="#e5e5e5" stroke-width="0.6"/>

  <!-- Row 4: Organizational independence -->
  <text class="row-label" x="60" y="505">Organizational independence</text>
  <use href="#dash-mark" x="540" y="500"/>
  <use href="#dash-mark" x="780" y="500"/>
  <use href="#dash-mark" x="1020" y="500"/>
  <use href="#check-mark" x="1260" y="500"/>
  <line x1="60" y1="535" x2="1340" y2="535" stroke="#bbb" stroke-width="0.8"/>

  <!-- ============ PRIMARY VULNERABILITIES ============ -->
  <text class="section-label" x="60" y="575">PRIMARY VULNERABILITIES</text>

  <!-- Tier 0 -->
  <text class="body-small" x="540" y="615" text-anchor="middle">17%/yr availability decay</text>
  <text class="body-small" x="540" y="635" text-anchor="middle">no redundancy</text>
  <text class="body-small" x="540" y="655" text-anchor="middle">one event ends the data</text>

  <!-- Tier 1 -->
  <text class="body-small" x="780" y="615" text-anchor="middle">platform opacity</text>
  <text class="body-small" x="780" y="635" text-anchor="middle">funding-model dependency</text>
  <text class="body-small" x="780" y="655" text-anchor="middle">jurisdictional exposure</text>

  <!-- Tier 2 -->
  <text class="body-small" x="1020" y="615" text-anchor="middle">governance or funding</text>
  <text class="body-small" x="1020" y="635" text-anchor="middle">failure collapses</text>
  <text class="body-small" x="1020" y="655" text-anchor="middle">the network</text>

  <!-- Tier 3 -->
  <text class="body-small" x="1260" y="615" text-anchor="middle">requires deliberate</text>
  <text class="body-small" x="1260" y="635" text-anchor="middle">participation to</text>
  <text class="body-small" x="1260" y="655" text-anchor="middle">generate copies</text>

  <line x1="60" y1="700" x2="1340" y2="700" stroke="#bbb" stroke-width="0.8"/>

  <!-- ============ EXAMPLES ============ -->
  <text class="section-label" x="60" y="740">EXAMPLES</text>

  <text class="example" x="540" y="785" text-anchor="middle">Lab server,</text>
  <text class="example" x="540" y="805" text-anchor="middle">PI laptop</text>

  <text class="example" x="780" y="785" text-anchor="middle">Zenodo, Dryad,</text>
  <text class="example" x="780" y="805" text-anchor="middle">AWS S3</text>

  <text class="example" x="1020" y="785" text-anchor="middle">CLOCKSS, LOCKSS,</text>
  <text class="example" x="1020" y="805" text-anchor="middle">INSDC, wwPDB</text>

  <text class="example" x="1260" y="785" text-anchor="middle">Git, BitTorrent,</text>
  <text class="example" x="1260" y="805" text-anchor="middle">IPFS, DNS</text>
</svg>
